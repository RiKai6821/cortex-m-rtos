name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: host unit tests + ARM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Host unit tests (39 checks, no toolchain needed)
        run: make test

      - name: Install ARM bare-metal toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi

      - name: Build the RTOS firmware for Cortex-M3
        run: make
